body:
  text: 周身穴法指明會參三卷銅人圖攢竹頭額眉縐上鼻角在兩鼻角夾車在兩墮下略離一分鼻流在鼻孔口為二穴肩井在肩上曲澤在手灣橫紋盡處曲池在肘外骨動窩處合谷在虎口之內軟肉上搃叉處少商在兩大指甲下外邊少衝在兩小指甲下外邊陰陵泉在靠膝肉略上些骨動處陽陵泉在膝外略下屈窩處臍下一寸為氣海臍下一寸五分為丹田患陰症用火醮諸穴皆屬督脈足大指有一穴如手指少商穴部位曰隱白屬肺脾經所謂足少商者即此
