body:
  text: 喉風諸方紫荊散紫荊皮二兩防風荊芥穗各五錢北細辛三錢地黃散又名內消散生地二兩赤芍五錢紅內消二兩即茜草丹皮五錢以上紫地二散每症合用加薄荷燈芯坐水中蒸服第二劑加桔梗連翹甘草咳嗽加桔梗麥冬知母作渴加銀鎖匙熱極者加犀角潮甚者加柴胡黃芩如下部虛加四物湯頭痛加白芷孕婦加四物去丹皮開關散川芎五錢白芷一兩北細辛二兩銀鎖匙天花粉二兩元參五錢薄荷一兩以上四方皆水劑用水蒸服冰硼散梅花冰片六釐揀白六釐麝香四釐硼砂一分牙硝三分制開關後次日去麝體虛頭暈亦去麝名品雪丹毒腫漸消去硝用破皮刀後亦去硝名呂雪丹合此藥最要乳至極輕鬆為度真功丹梅花冰片六釐熊膽一分黑色而苦者真置筍殼上用火焙退火用爐甘石一錢用羌活湯煅過研細飛去底下泥腳曬乾用硼砂一錢牙硝二分毒腫漸消去硝用刀後用二味散即品雪丹辛烏散又名角藥赤芍一兩用稍草烏一兩用圓而上尖者長者不用牙皂荊芥穗桔梗赤豆北細辛淮辛不用甘草生地各五錢紫荊皮一兩北柴胡連翹各五錢共為細末磁瓶收貯每用於口內則用井水調噙極為取痰聖藥如痰涎極甚則加入摩風膏其力更速口外則用井水調搽洗藥則用角藥洗加荊芥同水煎洗如懸𤷍加南星末少許效摩風膏川烏用尖磨水燈草灰不拘多少用潔淨碗干焙燒方有灰右合一處調成膏入辛烏散用消蘆散如人不可用刀即以藥熏破雖易見效不能速於收功紅內消一兩即茜草蘆柴根二兩去皮金毛狗脊五錢糖蜜根一兩即紫荊皮根用頂好米醋煮熏用小藥罐同米醋入內以厚紙封固於紙上開一小孔如頭大或用銅管或竹管對腫處熏如欲速效加江子即巴豆七粒去殼同入煮熏神效鎮驚丸桔梗甘草山藥梔炭各等分共為細末米飯糊丸如蓮子大硃砂為衣每服一丸薄荷燈心湯送下作末藥服亦可無喉風症只咽喉作渴者臨臥時服之蠟礬丸黃蠟一兩乳香去油沒藥各錢五去油枯礬五錢共為細末即用黃蠟為丸每服二錢開水送下生肌散沒藥三錢去油硼砂三錢龍骨火燒醋煅赤石脂各一兩火燒醋煅乳香三錢去油輕粉二錢五冰片一分兒茶二錢五共為細末每患處略用少許神功丹牙疳神效人中白二兩便壺中白火煅紅兒茶一兩黃柏青黛水飛薄荷各六錢冰片五分以上曝乾研末備用萬一丹誤用刀至血流不止者以此治之乳香去油血竭沒藥去油硼砂各一錢共為細末每用少許吹入口內其血即止六味地黃湯熟地四錢丹皮一錢五棗皮山藥各二錢雲苓澤瀉各五錢煎服四物湯熟地當歸白芍川芎各一錢水煎服諸方藥性辨開關散清頭止痛紫荊散疏風順氣地黃散消腫退熱銀鎖匙止渴退口燒心煩熱極者加犀角湯冰硼散治咽喉肫黑疏風利氣祛痰涎辛烏散又名角藥取風痰消熱毒功效最大若喉風極甚之症再加摩風膏少許其功力更加神速修合諸藥皆不見火一概生用至於開關針法非口傳授則不得其真也附喉科方秋留西瓜至十月取出損壞者去之用好者將瓜上開一孔抓去內心留皮帶肉將皮硝裝滿吊於朝北風口次年春季皮外自有霜刮下瓷瓶收好聽用加冰片三分兒茶二錢牛黃八分硼砂二錢珍珠粉一錢五分右研極細末此五味藥兌西瓜霜五錢逐日人神所在不宜針刺初一大指初二外踝初三腰內初四腰初五口初六手初七內踝初八腕初九尻初十腰背十一鼻柱十二髮際十三牙齒十四胃腕十五偏身十六胸十七氣衝十八股內十九足二十內踝草一手小指草二外踝草三肝足草四手陽明草五足陽明草六胸草七膝草八陰草九膝脛三十足跌通關神應散治一切咽喉腫痛雙單乳蛾喉痹纏喉等症冰片紅鐵皮煅即鐵上赤衣真鐵鏽也刮下聽用珍珠煅黃連煨硼砂海巴煅明礬煅地膽曬乾生用一名山慈菰辰砂各三分紅鐵皮性沉重平肝墜熱開結如神用鏽鐵火煅醋淬刮下共研細末瓷瓶收貯臨用管吹三五釐於喉風痛處立愈重者三五次取效紫袍散治咽喉十八症石青青黛硃砂各一錢冰片三分膽礬人中白煅元明粉各五分山豆根二錢為末收貯不可泄氣吹喉立愈此方可破棺而治之緑袍散兼治牙痛生石膏一錢粉草三錢僵蟲牛黃龍腦薄荷各五分硼砂生用一錢冰片一錢膽礬五分牙皂五分煙盡為度為末遇咽喉各症吹入四五次無論有痰與否任意吞之即愈又方黃柏大黃甘草各一錢麝香一分冰片五釐雄黃五分川貝二錢共為末治同上患者有痰勿吞下大便稍瀉不妨壯者可用弱者少用靈驗喉症方同紫袍散屢效黃柏青黛硼砂薄荷甘草各一錢冰片三分加鵝哽喉一條炙黃為末收貯勿泄氣吹喉即愈耳爛吹之亦驗吹喉散夷茶硼砂冰片川連各三分荸薺粉四分吹入喉內各症皆愈吹喉藥硼砂二錢五分雄黃三錢兒茶一錢冰片三分薄荷三兩另研共為末和勻貯不可泄氣吹入少許或挑入舌上噙一會咽下八九次若鎖喉風口內乾枯者以井水調灌即能開關生津若脾泄胃弱者不宜多用治喉不俱雙單蛾吹藥方真冰片兒茶各一分山豆根一錢白礬五釐京墨一錢陳者更佳舊襪底燒灰一錢洗淨煅為末共為細末吹入喉內立愈冰硼散治一切喉症薄荷硼砂各一錢人中白川連各八分青黛元明粉陳膽星各五分山豆根八分冰片二分共為細末吹喉神效喉風簡便方番木鱉三個水磨濃汁曬乾加冰片一分研勻吹喉立效冰梅方治咽喉百病半熟大梅子一百枚五月五日午時用食鹽朴硝各四兩水三碗浸梅子其水約過梅子三指浸一宿後豬牙皂去弦核防風蘇葉薄荷白礬各二兩生甘桔梗川連各一兩共研末拌入浸七日取梅曬又浸又曬以汁盡為度梅上起白霜收貯凡用取梅一枚綿包含口內有水先咽五六日後有痰涎吐盡以口內無痰只有清水方去梅子可以食粥一枚可治二病治咽喉不論雙單蛾用鮮芙蓉根為末蒸過酒黏米新糟同搗爛圍敷喉外不過一時立愈紅袍散治各樣喉症辰砂一兩飛硼砂二錢五分黃連兒茶血竭各一錢當門子梅片各五分牛黃一錢銀硃二錢共研細末吹喉神效烏龍丸治喉癬乳蛾神效兼骨硬喉垂危者烏梅肉五倍子各等分搗為丸彈子大每含一丸其痰旋裹藥土取出去痰仍含口中即愈喉痛元明粉七分雄黃三分為細末用筆蘸藥攪喉嘔出痰涎攪數次即愈或吹入亦可又細辛白芷各三錢皂角一錢五分為末吹之又皂角灰吊揚塵青鹽拌勻棉花包箸頭蘸藥攪去喉內涎沫用紅色牛膝水噙之又豬膽水浸黃柏浸曬七次研末吹之又冰片硼砂青黛為末吹之或加黃連甘草亦可又喉痛頭腫齒關不開燕窠泥二兩明雄黃五錢醋和炒潤七次濃陳茶調敷又射干根山豆根為末吹之又霜梅肉裹硼砂少許含於口中酸水下毒自解又豆根一兩硼砂二錢射香冰片各少許為末青魚膽糊丸如彈子大每服一丸噙化咽下又青鹽白礬等分吹患處吐痰即愈又扁柏葉汁山豆根汁雪裹青汁皆可服最效又喉腫痛不通巴豆去殼棉紙微裹隨塞左右鼻孔中立通又花粉薄荷黃柏黃芩牛子桔梗各一錢大黃六錢元參八分黃連四分甘草五分淡竹葉三十片水煎服有火者用妙如神單乳蛾喉癬喉癰腫痛吐咽不下命在須臾者鳳凰衣微火焙黃橄欖核瓦上火煅存性孩兒茶各等分為末每一錢加真冰片半分吹之即能進飲食神效無比蛾風一時無藥救急即柴灰沖湯數杯服之又用燒酒拍後頭窩以麻下剖數次即刻現它將磁針破它含酒吮去血再用鹽蛋泥敷之即刻開關蛾子生喉間不能窺探急按魚尾穴即大指後窩中是用燈火三灸再於大指甲根離一分寬針刺出血立效服加減甘桔解毒湯單雙蛾山豆根不拘多少加麝香少許為末吹入喉中自愈單蛾者其形圓如箸頭生於咽喉關上或左或右雙蛾則兩邊俱生或生咽下難治壁上蜘蛛白窠用患人腦後發一根纏定蜘蛛窩將銀簪刺在燈上燒之存性為末吹喉立愈乳蛾最效祕方將兩手大指旁縫內刺出血即松喉痹單雙乳蛾萬年青根搗汁二匙加米醋三匙嗽出痰涎自愈單雙乳蛾及一切喉風青魚膽汁曬乾收貯以少許放舌上含化立見奇功喉蛾神效用人指甲瓦上焙焦黃色研末吹入喉內即破喉痹乳蛾不能飲食驗方用新鮮牛膝根一握艾葉七片入乳數匙合搗取汁灌入鼻內須臾痰涎從口鼻流出即愈無艾亦可咽喉急證不拘單雙蛾不及用藥此方神效頂心上必有紫泡將泡挑破擠血淨俟結痂時去痂再擠血淨自將手指急搔頂心少頃頂心腫起再搔即破出少血喉內腫亦破即時全愈急喉痹其聲如鼾有如痰在喉中響者此為肺絶之候速用人參膏救之用竹茹薑汁調下獨參湯亦可若服早十全七八遲則不救矣急喉風烏梅一個去核包蜒蝣一條扎定含口中其水流至喉間枯礬一錢百草霜二分須鍋臍內者佳同研細吹之嘔出膠涎又馬藍頭汁漱之立愈又山楂子磨水以竹葉挑滴口內又燈芯燒灰吹之又鏽鐵磨濃水服又雞公肫內筋要不黏水者數片新瓦焙枯存性研末吹之急喉風土牛膝根搗汁加醋少許頭一口漱咯而吐之後服之立效纏喉風用牽牛鼻繩燒灰吹之甚效又用淡白梅一個去核將蜒遊一條放在梅內含之即瘥又白僵蟲二錢研細生薑自然汁少許和水灌下立愈又用萬年青根切碎打爛絞汁灌下吐出痰即好倘口閉用牙刷撬開灌下如不吐再用發稍進喉間吐出即愈急鎖喉風兼治單雙蛾用升麻四兩水煎灌服或用皂莢槌碎擂水灌服取吐即不吐亦安或白礬三錢慢火熬化入巴豆肉二粒研爛候乾去巴豆取礬研末吹少許入喉中取頑痰出立愈又膽礬一塊含口中痰涎自壅上吐盡即愈鎖喉風巴豆一粒用竹筒燒煙口吸即開又巴豆七粒三生四熟去殼明雄五分鬱金一個共研細末每用半茶匙清茶調服若咽塞不入吹之亦可又硼砂丹砂硃砂等分研末吹之又蠐螬取汁點喉痹又甘萄花根洗淨搗汁灌下即愈又皂角子一粒醋磨將口撬開用鵝毛翎蘸藥入喉內卷出膠痰能食藥水為止湯藥方金銀花二錢甘草三分桔梗三分牛蒡子一錢五分研細煎湯候用此方活人多矣喉閉方纏喉風急喉痹雙蛾湯藥不下者用此極效巴豆七粒去殼三生四熟熟者燈上燒存性明雄皂子大一塊鬱金一個如蟾膽大者共為末每服半劑清茶調服如口噤咽塞用竹管吹納喉中須臾吐痰即愈但能灌下無有不活甚驗喉閉手足厥冷氣閉命懸頃刻一時無藥或有藥不進者急將兩臂以手勒數十次取油發繩纏大拇指以針刺少商穴血滴下喉即解男左女右重者兩手齊針少商穴在大指殼內側邊離一分遠即是又鴨嘴膽礬研極細釅醋調灌吐出膠痰立愈喉閉蛾子看病人頭頂上有紅點用針挑破即愈單蛾一點紅雙蛾兩點紅又將頭頂心發上用姜擦紅紅即愈閉塞不通臘月初一日取豬膽不拘大小五六枚用黃連青黛薄荷僵蟲白礬朴硝各五錢裝入膽內青黛包好將地掘一孔方深一寸以竹橫懸此膽在內以物蓋定候至立春日取出待風吹去膽皮青紙研末密收痛吹少許神效喉癬頭胎黃牛屎以新瓦洗淨蓋屎周圍用文火煅煙盡存性取出研末徐徐吸入自愈又冰片牛黃各一分膽礬三分硼砂八分山豆根二錢雄黃兒茶各八分陳白梅去核三個共研末次將白梅搗爛入藥和勻丸如龍眼大臨臥合口內過夜即消爛喉應驗方牛黃五釐指甲五釐瓦上焙黃男女互用青黛六分壁喜窠草個要牆頭上者瓦焙黃冰片二釐藥珠三分象牙屑三分瓦上焙黃研末吹患處屢試屢驗其人晚年無子傳此方後舉兩子喉中忽硬一塊吞吐不下用厚朴茯苓紫蘇半夏各二錢甘草五分老薑一片煎服或照喉閉方用針手指出血亦妙百靈丸治喉中結塊不通水食者百草霜蜜和丸茨子大水化一丸灌下甚者不過二丸喉爛槐花三錢牛膝兒茶黃連各一錢為丸緑豆大每服三丸夏天西瓜水服冬天梨汁服咽喉懸癰舌腫塞痛五倍子僵蟲甘草等分為末以白梅去核搗丸彈子大噙噬其癰自破咽生息肉先刺出血豆豉同鹽塗之神效咽喉諸藥不效丹溪云此非喉症乃是鼻中生一條紅線如發懸一黑泡大如櫻珠垂掛到咽門而止口中飲食不入用牛膝根獨條肥大者搗碎入好醋三五滴同打細滴入鼻中二三點即系斷珠破吐出瘀血立安喉腫神效方即單雙蛾用冰片麝香皂角刺各三分共為末吹入患處一破即愈勢危急者用細磁針打破患處之頭其效更捷因風熱咽喉乾燥疼甘草防風荊芥薄荷黃芩各一錢桔梗三錢水煎後服骨鯁喉歌縮砂草果威靈仙清水砂糖共配煎接連服下二三鹽諸般骨硬化為涎魚骨鯁喉即在席上隨取魚骨不拘粗細夾在耳丫內男左女右不與人知仍食物自然一併吞下屢驗又橄欖核並湯服之亦驗骨鯁神效用茶一杯或水亦可戟指寫車字於茶水之上惟車心一直戟指倒直上飲茶水即化吞魚骨用河中養蓄活鴨倒掛垂涎以磁碗接下令患人仰臥頻灌其骨盡化吞獸骨用狗一隻倒掛接涎如前法灌亦效諸骨鯁喉苧麻根水如雞骨卡即用雞骨湯對服余類推又鳳仙花子白湯送下即下又象牙磨滾水服亦下吞發達喉仍將發燒灰開水調下吞竹葉卡喉取牛口涎以開水調服木屑鐵斧磨汁灌之吞金誤吞五金以飴糖半斤啖之吞銀韭茶一把滾水煮軟不切斷淡食之少頃茶包銀嘔出或從大便出吞銅錢木耳蜂蜜匕醋同炒服之錢從大便中出雞冠血少許吞入喉用銅盆置面前將冷水對面上一噴其錢即吐盆中多食荸薺其錢自化羊脛骨燒灰研末米湯下三錢吞鐵二方磁石芒硝各一錢煎服數次鐵自化栗樹炭二塊研末砂糖和丸服三錢立出吞針三方鹽蛋一個略煮水切食即裹針從大便出矣蝦蟆眼內烏珠一對冷水囫圇吞下其針兩頭穿珠立刻吐出冬天無處尋蝦膜即在桑樹下掘三尺自有小兒吞針將半生熟出芽蠶豆搗爛用韭菜汁為丸吞下諸骨梗喉立效方用急性子二十粒即鳳仙花子白湯送即下誤吞金氣以蚯蚓糞溫水攪吞即解出凡三四月間有喉間病者皆因寒天寒氣鬱結不開至春時發須於初冬時多買萊蔔菜俗名蘿蔔葉攤在瓦屋上任他日曬風雨雪霜打不要收下到立春前一日收下掛在無日頭處陰乾春二三月收來切碎將醬或鹽放在碗中飯鍋上蒸熟當日日吃飯小菜甚妙一家永無喉風之患
